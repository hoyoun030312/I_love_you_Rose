<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you Rose</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumBarunGothic@1.0/nanumbarungothic.css">
    
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background-color: #fdfaf1; /* 아이보리 배경 */
            /* 나눔바른고딕 적용 */
            font-family: 'NanumBarunGothic', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* 유튜브 영상 영역 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            background-color: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 무한 확장 줄노트 편지지 */
        .letter-paper {
            background-color: #ffffff;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px);
            background-size: 100% 2.2rem; 
            line-height: 2.2rem;
            padding: 2.5rem;
            min-height: 400px;
            height: auto; /* 내용 길어지면 자동 확장 */
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: left;
            
            /* 글자 크기 및 스타일 */
            font-size: 1.1rem; 
            color: #333;
            border: 1px solid #eee;
            white-space: pre-wrap;
            word-wrap: break-word;
            letter-spacing: -0.5px; /* 고딕체는 자간을 살짝 줄여야 예쁨 */
        }

        .instruction {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #7a6b5d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/zIMUVTbRmek" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen></iframe>
        </div>

        <div class="instruction"> A Thousand Years - Christina Perri 🎵 </div>

        <div class="letter-paper">
시발년아
        </div>
    </div>

</body>
</html>
